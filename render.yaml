services:
  - type: web
    name: grameen-seva-twilio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python twilio_server.py
    envVars:
      - key: SARVAM_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EXOTEL_ACCOUNT_SID
        sync: false
      - key: EXOTEL_API_KEY
        sync: false
      - key: EXOTEL_API_TOKEN
        sync: false
      - key: EXOTEL_EXOPHONE
        sync: false
      - key: EXOTEL_APP_ID
        value: "1298353"
      - key: EXOTEL_REGION
        value: singapore
      - key: GRAMEEN_SEVA_DB_PATH
        value: data/grameen_seva.sqlite3
      - key: DATABASE_URL
        fromDatabase:
          name: grameen-seva-db
          property: connectionString
      - key: KNOWLEDGE_CACHE_TTL_SECONDS
        value: "604800"

databases:
  - name: grameen-seva-db
    plan: free
